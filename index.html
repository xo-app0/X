<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>صَوْن — ودودة صديقك الرقمي الآمن</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#020810;font-family:'Noto Naskh Arabic','Segoe UI',sans-serif}
::-webkit-scrollbar{width:0}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
input::placeholder,textarea::placeholder{color:#4a6a80}
.phone{width:100%;max-width:390px;height:100dvh;max-height:844px;margin:0 auto;position:relative;overflow:hidden;background:#060e18}
@media(min-width:420px){body{display:flex;align-items:center;justify-content:center;min-height:100vh}.phone{border-radius:40px;box-shadow:0 20px 80px rgba(0,0,0,.8)}}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;transform:scale(.97)}
.scr.on{opacity:1;pointer-events:auto;z-index:10;transform:scale(1)}
.bnav{display:flex;justify-content:space-around;align-items:center;background:linear-gradient(180deg,rgba(13,31,48,.97),rgba(9,24,40,.99));border-top:1px solid rgba(0,229,200,.12);padding:6px 0 max(12px,env(safe-area-inset-bottom));position:absolute;bottom:0;left:0;right:0;z-index:100;backdrop-filter:blur(20px)}
.nb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 6px;transition:all .3s;position:relative}
.nb .ni{font-size:18px;transition:transform .3s}.nb .nl{font-size:9px;font-weight:600;color:#5a8098;transition:color .3s}
.nb.on .ni{transform:scale(1.2)}.nb.on .nl{color:#00e5c8}
.nb.on::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:#00e5c8;border-radius:2px}
.nb:not(.on){opacity:.55}
.sos{position:absolute;top:16px;left:16px;z-index:200;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff4757,#c0392b);border:2px solid rgba(255,71,87,.4);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,71,87,.4);animation:sosPulse 2s infinite}
@keyframes sosPulse{0%,100%{box-shadow:0 4px 20px rgba(255,71,87,.4)}50%{box-shadow:0 4px 30px rgba(255,71,87,.7)}}
@keyframes wFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadBar{from{width:0}to{width:100%}}
@keyframes typeDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-5px)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.6);opacity:.8}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,transparent 30%,rgba(0,229,200,.06) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 3s infinite}
.card{background:#0d1f30;border-radius:18px;border:1px solid rgba(0,229,200,.08);overflow:hidden}
.card-glow{border-color:rgba(0,229,200,.2);box-shadow:0 4px 24px rgba(0,229,200,.08)}
.teal-btn{padding:14px 24px;background:linear-gradient(135deg,#00e5c8,#007878);border:none;border-radius:14px;color:#060e18;font-size:15px;font-weight:700}
.ghost-btn{padding:14px 24px;background:transparent;border:1px solid rgba(0,229,200,.4);border-radius:14px;color:#00e5c8;font-size:15px;font-weight:700}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
button:active{transform:scale(0.96)!important}
</style>
</head>
<body>
<div class="phone" id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const S={SPLASH:0,ONBOARD:1,WELCOME:2,HOME:3,CHAT:4,QUIZ:5,RESULTS:6,JOURNEY:7,VIDEO:8,SESSIONS:9,LEGAL:10,PROFILE:11,BREATHE:12,STORIES:13,REPORT:14};
function Particles(){const ref=useRef(null);useEffect(()=>{const c=ref.current,ctx=c.getContext('2d');let w=c.width=c.parentElement.clientWidth,h=c.height=c.parentElement.clientHeight;const ps=Array.from({length:35},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.4+.1}));let raf;const draw=()=>{ctx.clearRect(0,0,w,h);ps.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>w)p.dx*=-1;if(p.y<0||p.y>h)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,229,200,${p.o})`;ctx.fill()});ps.forEach((a,i)=>ps.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<100){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,229,200,${.06*(1-d/100)})`;ctx.stroke()}}));raf=requestAnimationFrame(draw)};draw();const resize=()=>{w=c.width=c.parentElement.clientWidth;h=c.height=c.parentElement.clientHeight};window.addEventListener('resize',resize);return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize)}},[]);return <canvas ref={ref} style={{position:'absolute',inset:0,zIndex:0,pointerEvents:'none'}}/>}
function W({size=120,glow=true,anim=false,mood='happy'}){const smiles={happy:'M85 88Q100 98 115 88',thinking:'M88 90H112',sad:'M88 94Q100 86 112 94'};return(<svg width={size} height={size} viewBox="0 0 200 200" style={anim?{animation:'wFloat 3s ease-in-out infinite'}:{}}><defs><radialGradient id="bg" cx="50%" cy="40%" r="60%"><stop offset="0%" stopColor="#2a4a6b"/><stop offset="100%" stopColor="#0a1e33"/></radialGradient><filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="sg"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><ellipse cx="100" cy="130" rx="55" ry="50" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1.5"/><ellipse cx="100" cy="72" rx="48" ry="42" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1.5"/><ellipse cx="100" cy="75" rx="38" ry="30" fill="#0d1f30" opacity=".9"/><ellipse cx="82" cy="72" rx="10" ry="12" fill="#00e5c8" opacity=".85" filter={glow?"url(#gl)":""}>{anim&&<animate attributeName="opacity" values=".85;.5;.85" dur="3s" repeatCount="indefinite"/>}</ellipse><ellipse cx="118" cy="72" rx="10" ry="12" fill="#00e5c8" opacity=".85" filter={glow?"url(#gl)":""}>{anim&&<animate attributeName="opacity" values=".85;.5;.85" dur="3s" repeatCount="indefinite"/>}</ellipse><path d={smiles[mood]||smiles.happy} fill="none" stroke="#00e5c8" strokeWidth="2.5" strokeLinecap="round" opacity=".8"/><path d="M52 65Q52 30 100 28Q148 30 148 65" fill="none" stroke="#1a3a5c" strokeWidth="8" strokeLinecap="round"/><circle cx="50" cy="72" r="14" fill="#1a3a5c"/><circle cx="50" cy="72" r="8" fill="#00e5c8" opacity=".6" filter={glow?"url(#gl)":""}>{anim&&<animate attributeName="opacity" values=".6;.3;.6" dur="2s" repeatCount="indefinite"/>}</circle><circle cx="150" cy="72" r="14" fill="#1a3a5c"/><circle cx="150" cy="72" r="8" fill="#00e5c8" opacity=".6" filter={glow?"url(#gl)":""}>{anim&&<animate attributeName="opacity" values=".6;.3;.6" dur="2s" repeatCount="indefinite"/>}</circle><line x1="50" y1="86" x2="50" y2="100" stroke="#1a3a5c" strokeWidth="3"/><circle cx="50" cy="103" r="5" fill="#1a3a5c"/><circle cx="100" cy="130" r="8" fill="#00e5c8" opacity=".5" filter="url(#sg)">{anim&&<><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;.7;.3" dur="2s" repeatCount="indefinite"/></>}</circle><ellipse cx="55" cy="140" rx="12" ry="8" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1" transform="rotate(-20 55 140)"/><ellipse cx="145" cy="140" rx="12" ry="8" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1" transform="rotate(20 145 140)"/><circle cx="140" cy="120" r="10" fill="#1a3a5c" stroke="#00e5c8" strokeWidth="1" opacity=".7"/></svg>)}
function Nav({active,go}){const t=[{id:S.PROFILE,i:'👤',l:'حسابي'},{id:S.LEGAL,i:'⚖️',l:'القانون'},{id:S.SESSIONS,i:'🎧',l:'جلسات'},{id:S.JOURNEY,i:'🎓',l:'الرحلة'},{id:S.HOME,i:'🏠',l:'الرئيسية'}];return <div className="bnav">{t.map(x=><button key={x.id} className={`nb ${active===x.id?'on':''}`} onClick={()=>go(x.id)}><span className="ni">{x.i}</span><span className="nl">{x.l}</span></button>)}</div>}
function SOS({go}){return <button className="sos" onClick={()=>go(S.LEGAL)} title="طوارئ">SOS</button>}
function Splash({done}){useEffect(()=>{const t=setTimeout(done,3000);return()=>clearTimeout(t)},[]);return(<div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',background:'radial-gradient(ellipse at 50% 30%,#0f2d45,#060e18 70%)',position:'relative'}}><Particles/><div style={{animation:'wFloat 3s ease-in-out infinite, fadeScale 1s ease-out',zIndex:1}}><W size={170} glow anim/></div><h1 style={{fontSize:56,fontWeight:700,color:'#fff',margin:'24px 0 8px',animation:'fadeUp 1s .5s both',zIndex:1}}>صَوْن</h1><p style={{color:'#00e5c8',fontSize:14,fontWeight:500,opacity:0,animation:'fadeUp 1s 1s both',letterSpacing:1,zIndex:1}}>ودودة — صديقك الرقمي الآمن</p><div style={{marginTop:40,width:140,height:4,borderRadius:4,background:'#1a3a5c',overflow:'hidden',animation:'fadeUp 1s 1.5s both',zIndex:1}}><div style={{height:'100%',background:'linear-gradient(90deg,#00e5c8,#007878)',animation:'loadBar 2.5s ease-in-out forwards',borderRadius:4}}/></div></div>)}
function Onboard({done}){const[i,setI]=useState(0);const slides=[{icon:'🤫',title:'سرية تامة',desc:'لا حساب، لا اسم، لا بريد إلكتروني. محادثاتك مشفّرة ولا تغادر جهازك.',color:'#00e5c8'},{icon:'🧠',title:'اختبار ذكي',desc:'أسئلة بسيطة تكشف نمط الإساءة وتسمّيه باسمه — في دقائق معدودة.',color:'#a78bfa'},{icon:'🎓',title:'رحلة معرفية',desc:'فيديوهات من أخصائيات تشرح ما تعيشه وتقدّم أدوات عملية للتعامل.',color:'#fbbf24'},{icon:'💚',title:'جلسات بسعر طالب',desc:'الجلسة الأولى مجانية. بعدها 15 دينارًا فقط للطلاب. بخصوصية كاملة.',color:'#34d399'}];const s=slides[i];return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',position:'relative'}}><Particles/><div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:32,textAlign:'center',zIndex:1}}><div key={i} style={{animation:'fadeScale .5s ease-out'}}><div style={{fontSize:64,marginBottom:20}}>{s.icon}</div><h2 style={{color:'#fff',fontSize:24,fontWeight:700,marginBottom:12}}>{s.title}</h2><p style={{color:'#8ab4cc',fontSize:14,lineHeight:2,maxWidth:280}}>{s.desc}</p></div><div style={{display:'flex',gap:8,marginTop:32}}>{slides.map((_,j)=><div key={j} style={{width:j===i?24:8,height:8,borderRadius:4,background:j===i?s.color:'#1a3a5c',transition:'all .3s'}}/>)}</div><div style={{display:'flex',gap:12,marginTop:32,width:'100%',maxWidth:300}}>{i<slides.length-1?<><button className="ghost-btn" style={{flex:1}} onClick={done}>تخطّي</button><button className="teal-btn" style={{flex:1}} onClick={()=>setI(i+1)}>التالي ←</button></>:<button className="teal-btn" style={{flex:1,fontSize:17,padding:'16px 0',boxShadow:'0 4px 30px rgba(0,229,200,.35)'}} onClick={done}>ابدأ مع ودودة</button>}</div></div></div>)}
function Welcome({go}){return(<div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:32,textAlign:'center',background:'radial-gradient(ellipse at 50% 20%,#0f2d45,#060e18 80%)',position:'relative'}}><Particles/><div style={{animation:'wFloat 4s ease-in-out infinite',zIndex:1}}><W size={140} glow anim/></div><h2 style={{color:'#fff',fontSize:28,margin:'24px 0 12px',fontWeight:700,zIndex:1}}>مرحبًا بك في صَوْن</h2><p style={{color:'#8ab4cc',fontSize:14,lineHeight:2,maxWidth:280,zIndex:1}}>أنا ودودة، رفيقتك الرقمية الآمنة. أنا هون عشان أسمعك وأساعدك بخصوصية تامة وأمان.</p><button onClick={()=>go(S.HOME)} className="teal-btn" style={{marginTop:28,padding:'16px 52px',borderRadius:28,fontSize:18,boxShadow:'0 4px 30px rgba(0,229,200,.35)',zIndex:1}}>ابدأ الآن</button><p style={{color:'#4a7a95',fontSize:11,marginTop:16,zIndex:1}}>لا تسجيل • لا بيانات شخصية • سرية تامة</p></div>)}
function Home({go}){const[mood,setMood]=useState(null);const moods=[{e:'😊',l:'جيد',c:'#34d399'},{e:'😐',l:'عادي',c:'#fbbf24'},{e:'😔',l:'حزين',c:'#f87171'},{e:'😰',l:'قلق',c:'#a78bfa'},{e:'😡',l:'غاضب',c:'#fb923c'}];const tips=['أنتِ لستِ المشكلة. تذكّري ذلك دائمًا.','مشاعرك حقيقية وتستحق أن تُسمع.','الاعتراف بالألم ليس ضعفًا، بل شجاعة.','لا أحد يستحق أن يُقلَّل من شأنه.','خطوة واحدة صغيرة قد تغيّر كل شيء.'];const[tip]=useState(tips[Math.floor(Math.random()*tips.length)]);return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl',position:'relative'}}><Particles/><SOS go={go}/><div style={{flex:1,overflowY:'auto',padding:'16px 16px 80px',zIndex:1}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}><div><div style={{color:'#fff',fontSize:20,fontWeight:700}}>مرحبًا بك 💚</div><div style={{color:'#7a9bb5',fontSize:12,marginTop:2}}>كيف حالك اليوم؟</div></div><div onClick={()=>go(S.CHAT)} style={{cursor:'pointer',animation:'wFloat 3s ease-in-out infinite'}}><W size={52} glow anim/></div></div><div className="card card-glow" style={{padding:'18px 20px',marginBottom:14,background:'linear-gradient(135deg,#0d2233,#0a1a2a)'}}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span style={{fontSize:16}}>✨</span><span className="tag" style={{background:'rgba(0,229,200,.15)',color:'#00e5c8'}}>رسالة اليوم</span></div><p style={{color:'#d0e8f0',fontSize:15,lineHeight:2,fontWeight:600}}>{tip}</p></div><div className="card" style={{padding:'16px 18px',marginBottom:14}}><p style={{color:'#8ab4cc',fontSize:13,marginBottom:12,fontWeight:600}}>كيف تشعر/ين الآن؟</p><div style={{display:'flex',justifyContent:'space-between'}}>{moods.map((m,i)=><button key={i} onClick={()=>setMood(i)} style={{background:mood===i?`${m.c}20`:'transparent',border:mood===i?`2px solid ${m.c}`:'2px solid transparent',borderRadius:14,padding:'10px 6px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,transition:'all .3s',flex:1}}><span style={{fontSize:26,transform:mood===i?'scale(1.2)':'scale(1)',transition:'transform .3s'}}>{m.e}</span><span style={{fontSize:10,color:mood===i?m.c:'#5a8098',fontWeight:600}}>{m.l}</span></button>)}</div>{mood!==null&&<div style={{marginTop:10,padding:'10px 14px',background:'rgba(0,229,200,.06)',borderRadius:10,animation:'fadeUp .3s'}}><p style={{color:'#8ab4cc',fontSize:12,lineHeight:1.8}}>تم تسجيل مزاجك 💚 هذا يساعدنا نفهمك أكثر.</p></div>}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>{[{i:'💬',t:'تحدث مع ودودة',c:'#00e5c8',s:S.CHAT},{i:'📝',t:'ابدأ الاختبار',c:'#a78bfa',s:S.QUIZ},{i:'🫁',t:'تمرين التنفس',c:'#34d399',s:S.BREATHE},{i:'📖',t:'قصص مجهولة',c:'#fbbf24',s:S.STORIES}].map((a,j)=><button key={j} onClick={()=>go(a.s)} className="card" style={{padding:'20px 14px',textAlign:'center',border:`1px solid ${a.c}15`,transition:'all .3s'}}><div style={{fontSize:28,marginBottom:8}}>{a.i}</div><div style={{color:'#fff',fontSize:13,fontWeight:600}}>{a.t}</div></button>)}</div><div className="card card-glow" style={{padding:'18px 20px',marginBottom:14}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{color:'#fff',fontSize:14,fontWeight:700}}>تقدّمك هذا الأسبوع</span><button onClick={()=>go(S.REPORT)} style={{background:'rgba(0,229,200,.1)',border:'none',borderRadius:10,padding:'6px 12px',color:'#00e5c8',fontSize:11,fontWeight:600}}>التقرير ←</button></div><div style={{display:'flex',gap:12}}>{[{n:'5',l:'أيام متالية',c:'#00e5c8'},{n:'2/6',l:'فيديو مكتمل',c:'#a78bfa'},{n:'68%',l:'مستوى الوعي',c:'#fbbf24'}].map((s,i)=><div key={i} style={{flex:1,textAlign:'center'}}><div style={{color:s.c,fontSize:20,fontWeight:700}}>{s.n}</div><div style={{color:'#5a8098',fontSize:10,marginTop:2}}>{s.l}</div></div>)}</div></div><button onClick={()=>go(S.JOURNEY)} className="shimmer" style={{width:'100%',padding:'18px 20px',background:'linear-gradient(135deg,#0d2233,#0a1a2a)',border:'1px solid rgba(0,229,200,.15)',borderRadius:18,display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}><div style={{width:46,height:46,borderRadius:14,background:'linear-gradient(135deg,#00e5c8,#007878)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🎓</div><div style={{flex:1,textAlign:'right'}}><div style={{color:'#fff',fontSize:14,fontWeight:700}}>أكمل رحلتك المعرفية</div><div style={{color:'#7a9bb5',fontSize:11,marginTop:2}}>الفيديو التالي: سلوك الجذب والصد</div></div><div style={{color:'#00e5c8',fontSize:20}}>‹</div></button></div><Nav active={S.HOME} go={go}/></div>)}

function Legal({go}){const arts=[{t:'قانون الحماية من العنف الأسري',d:'النصوص الكاملة مبسّطة',i:'📜'},{t:'حقوقك كضحية عنف عاطفي',d:'ما الذي يحميك القانون',i:'⚖️'},{t:'كيف تقدّم/ين شكوى رسمية',d:'الخطوات والجهات المختصة',i:'📝'},{t:'أرقام ومراكز الدعم الفوري',d:'خطوط ساخنة ومراكز مساعدة',i:'📞'}];return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}><div style={{padding:'16px 20px 8px',flexShrink:0}}><h2 style={{color:'#fff',fontSize:20}}>المكتبة القانونية</h2><p style={{color:'#7a9bb5',fontSize:12,marginTop:2}}>بشراكة مع جهة قانونية معتمدة</p></div><div style={{flex:1,overflowY:'auto',padding:'8px 16px 80px'}}>{arts.map((a,i)=><div key={i} className="card" style={{display:'flex',alignItems:'center',gap:14,padding:'16px 18px',marginBottom:10,cursor:'pointer'}}><div style={{width:48,height:48,borderRadius:14,background:'#152a3d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{a.i}</div><div style={{flex:1}}><div style={{color:'#fff',fontSize:14,fontWeight:600}}>{a.t}</div><div style={{color:'#7a9bb5',fontSize:12,marginTop:4}}>{a.d}</div></div><div style={{color:'#4a7a95',fontSize:18}}>‹</div></div>)}<button style={{width:'100%',padding:'18px 0',background:'linear-gradient(135deg,rgba(255,71,87,.2),rgba(255,71,87,.08))',border:'1px solid rgba(255,71,87,.4)',borderRadius:16,color:'#ff6b7a',fontSize:16,fontWeight:700,marginTop:8}}>🆘 اتصل بخط الطوارئ الآن</button></div><Nav active={S.LEGAL} go={go}/></div>)}
function Profile({go}){const badges=[{e:'⭐',l:'أول خطوة',on:true},{e:'🧠',l:'وعي ذاتي',on:true},{e:'🔥',l:'5 أيام',on:true},{e:'🎓',l:'الرحلة كاملة',on:false},{e:'💎',l:'30 يومًا',on:false},{e:'🏆',l:'البطل/ة',on:false}];return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}><div style={{flex:1,overflowY:'auto',padding:'20px 20px 80px'}}><div style={{textAlign:'center',marginBottom:20}}><div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,#152a3d,#0d1f30)',border:'2px solid #00e5c8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 12px'}}>🌿</div><h2 style={{color:'#fff',fontSize:18,marginBottom:4}}>مستخدم/ة مجهول/ة</h2><p style={{color:'#7a9bb5',fontSize:12}}>خصوصيتك هي أولويتنا</p></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>{[{n:'5',l:'أيام متالية',c:'#00e5c8'},{n:'68%',l:'مستوى التأثر',c:'#fbbf24'},{n:'2',l:'فيديو مكتمل',c:'#a78bfa'}].map((s,i)=><div key={i} className="card" style={{padding:'16px 8px',textAlign:'center'}}><div style={{color:s.c,fontSize:22,fontWeight:700}}>{s.n}</div><div style={{color:'#5a8098',fontSize:10,marginTop:2}}>{s.l}</div></div>)}</div><div className="card" style={{padding:'16px 18px',marginBottom:16}}><p style={{color:'#fff',fontSize:14,fontWeight:700,marginBottom:12}}>إنجازاتك</p><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>{badges.map((b,i)=><div key={i} style={{textAlign:'center',padding:'12px 4px',background:b.on?'rgba(0,229,200,.06)':'rgba(255,255,255,.02)',borderRadius:14,opacity:b.on?1:.35,border:`1px solid ${b.on?'rgba(0,229,200,.15)':'transparent'}`}}><div style={{fontSize:24,marginBottom:4}}>{b.e}</div><div style={{color:b.on?'#d0e8f0':'#5a8098',fontSize:10,fontWeight:600}}>{b.l}</div></div>)}</div></div>{[{i:'🔔',l:'التنبيهات',s:'مفعّلة'},{i:'🌙',l:'وضع النوم',s:'11 م — 7 ص'},{i:'🔐',l:'الخصوصية',s:'تشفير محلي كامل'},{i:'🌐',l:'اللغة',s:'العربية'},{i:'📊',l:'التقرير الأسبوعي',s:'عرض',go:S.REPORT},{i:'❓',l:'المساعدة',s:'الأسئلة الشائعة'}].map((it,i)=><div key={i} onClick={()=>it.go&&go(it.go)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',background:'#0d1f30',borderRadius:14,marginBottom:8,border:'1px solid rgba(0,229,200,.06)',cursor:'pointer'}}><span style={{fontSize:18}}>{it.i}</span><div style={{flex:1}}><div style={{color:'#fff',fontSize:14,fontWeight:600}}>{it.l}</div><div style={{color:'#7a9bb5',fontSize:11}}>{it.s}</div></div><div style={{color:'#4a7a95'}}>‹</div></div>)}</div><Nav active={S.PROFILE} go={go}/></div>)}
function Breathe({go}){const[phase,setPhase]=useState('ready');const[count,setCount]=useState(0);const[label,setLabel]=useState('اضغط للبدء');const start=()=>{if(phase!=='ready')return;let c=0;const cycle=()=>{if(c>=3){setPhase('ready');setLabel('انتهى — أحسنت 💚');return}setPhase('in');setLabel('شهيق...');setCount(4);let s=4;const ti=setInterval(()=>{s--;setCount(s);if(s<=0){clearInterval(ti);setPhase('hold');setLabel('احبس...');setCount(4);let h=4;const th=setInterval(()=>{h--;setCount(h);if(h<=0){clearInterval(th);setPhase('out');setLabel('زفير...');setCount(6);let o=6;const to=setInterval(()=>{o--;setCount(o);if(o<=0){clearInterval(to);c++;cycle()}},1000)}},1000)}},1000)};cycle()};const colors={ready:'#1a3a5c',in:'#00e5c8',hold:'#a78bfa',out:'#34d399'};return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl',position:'relative'}}><Particles/><div style={{padding:'16px 20px',flexShrink:0,zIndex:1}}><button onClick={()=>go(S.HOME)} style={{background:'none',border:'none',color:'#7a9bb5',fontSize:20}}>→</button></div><div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',zIndex:1,padding:32}}><h2 style={{color:'#fff',fontSize:22,fontWeight:700,marginBottom:8}}>تمرين التنفس العميق</h2><p style={{color:'#7a9bb5',fontSize:13,marginBottom:32}}>4 ثوانِ شهيق • 4 ثوانِ حبس • 6 ثوانِ زفير</p><div onClick={start} style={{width:180,height:180,borderRadius:'50%',border:`3px solid ${colors[phase]}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .5s',boxShadow:`0 0 40px ${colors[phase]}30`,background:`${colors[phase]}10`,position:'relative'}}><div style={{position:'absolute',inset:-20,borderRadius:'50%',border:`1px solid ${colors[phase]}20`,animation:phase!=='ready'?'breathe 4s ease-in-out infinite':'none'}}/><div style={{fontSize:40,fontWeight:700,color:colors[phase],transition:'color .5s'}}>{phase==='ready'?'🫁':count}</div><div style={{fontSize:14,color:'#8ab4cc',marginTop:8,fontWeight:600}}>{label}</div></div><p style={{color:'#5a8098',fontSize:12,marginTop:32,textAlign:'center',lineHeight:2}}>التنفس العميق يساعدك على تهدئة جهازك العصبي واستعادة السيطرة في لحظات القلق.</p></div></div>)}
function Stories({go}){const stories=[{text:'كنت أعتقد أن اللي بمر فيه طبيعي. لما عرفت إنه اسمه "إساءة عاطفية" تغيّر كل شي.',age:'شابة، 23 سنة',tag:'تسمية',color:'#00e5c8'},{text:'أنا شاب وكنت ضحية. ما كان في مكان يفهمني. لأول مرة حسيت إن حدا بيسمعني.',age:'شاب، 25 سنة',tag:'ذكور ضحايا',color:'#a78bfa'},{text:'الجلسة المجانية غيّرت حياتي. الأخصائية ساعدتني أشوف الأمور من زاوية ثانية.',age:'متزوجة حديثًا، 24 سنة',tag:'جلسة علاجية',color:'#34d399'},{text:'تمرين التنفس اللي بالتطبيق بستخدمه كل ليلة. بساعدني أهدى قبل ما أنام.',age:'طالبة، 21 سنة',tag:'أدوات عملية',color:'#fbbf24'}];return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}><div style={{padding:'16px 20px 8px',flexShrink:0}}><div style={{display:'flex',alignItems:'center',gap:10}}><button onClick={()=>go(S.HOME)} style={{background:'none',border:'none',color:'#7a9bb5',fontSize:20}}>→</button><h2 style={{color:'#fff',fontSize:20,flex:1}}>قصص مجهولة</h2></div><p style={{color:'#7a9bb5',fontSize:12,marginTop:4}}>قصص حقيقية من مستخدمين شجعان</p></div><div style={{flex:1,overflowY:'auto',padding:'12px 16px 80px'}}>{stories.map((s,i)=><div key={i} className="card card-glow" style={{padding:'20px',marginBottom:14,animation:`slideUp .5s ${i*.1}s both`}}><span className="tag" style={{background:`${s.color}20`,color:s.color,marginBottom:12}}>{s.tag}</span><p style={{color:'#d0e8f0',fontSize:15,lineHeight:2,margin:'8px 0 12px'}}>«{s.text}»</p><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'#5a8098',fontSize:12}}>— {s.age}</span><button style={{background:'none',border:'none',color:'#00e5c8',fontSize:12,fontWeight:600}}>💚 ألهمني</button></div></div>)}<button className="ghost-btn" style={{width:'100%',marginTop:8}}>شارك قصتك (مجهولة) ←</button></div><Nav active={S.HOME} go={go}/></div>)}
function Report({go}){const days=['أحد','إثن','ثلا','أرب','خمي','جمع','سبت'];const vals=[3,5,4,7,6,2,4];const max=Math.max(...vals);return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}><div style={{padding:'16px 20px 8px',flexShrink:0}}><div style={{display:'flex',alignItems:'center',gap:10}}><button onClick={()=>go(S.HOME)} style={{background:'none',border:'none',color:'#7a9bb5',fontSize:20}}>→</button><h2 style={{color:'#fff',fontSize:20,flex:1}}>التقرير الأسبوعي</h2></div></div><div style={{flex:1,overflowY:'auto',padding:'8px 16px 80px'}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>{[{n:'68%',l:'مستوى الوعي',c:'#00e5c8',ch:'↑ 12%'},{n:'5',l:'أيام نشطة',c:'#34d399',ch:'↑ 2'},{n:'31',l:'دقيقة تعلم',c:'#a78bfa',ch:'↑ 8'},{n:'4',l:'تمارين تنفس',c:'#fbbf24',ch:'جديد'}].map((s,i)=><div key={i} className="card" style={{padding:'16px',textAlign:'center'}}><div style={{color:s.c,fontSize:24,fontWeight:700}}>{s.n}</div><div style={{color:'#5a8098',fontSize:11,marginTop:2}}>{s.l}</div><div style={{color:s.c,fontSize:10,marginTop:6,background:`${s.c}15`,display:'inline-block',padding:'2px 8px',borderRadius:8}}>{s.ch}</div></div>)}</div><div className="card" style={{padding:'20px 18px',marginBottom:16}}><p style={{color:'#fff',fontSize:14,fontWeight:700,marginBottom:16}}>نشاطك خلال الأسبوع</p><div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',height:120,gap:6}}>{days.map((d,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}><div style={{color:'#00e5c8',fontSize:10,fontWeight:700}}>{vals[i]}</div><div style={{width:'100%',height:`${(vals[i]/max)*100}%`,background:'linear-gradient(180deg,#00e5c8,#007878)',borderRadius:6,minHeight:4,transition:'height .5s',animation:`slideUp .5s ${i*.05}s both`}}/><div style={{color:'#5a8098',fontSize:10}}>{d}</div></div>)}</div></div><div className="card" style={{padding:'18px',marginBottom:16}}><p style={{color:'#fff',fontSize:14,fontWeight:700,marginBottom:12}}>سجل المزاج</p><div style={{display:'flex',justifyContent:'space-between'}}>{'😔😐😊😰😊😊😐'.split('').filter((_,i)=>i<7).map((e,i)=><div key={i} style={{textAlign:'center'}}><div style={{fontSize:22}}>{['😔','😐','😊','😰','😊','😊','😐'][i]}</div><div style={{color:'#5a8098',fontSize:9,marginTop:4}}>{days[i]}</div></div>)}</div></div><div style={{background:'rgba(0,229,200,.06)',borderRadius:16,padding:'16px 20px',border:'1px solid rgba(0,229,200,.15)'}}><p style={{color:'#d0e8f0',fontSize:14,lineHeight:2}}>💚 <strong>أسبوع رائع!</strong> تقدّمك ملموس. استمر/ي — كل خطوة بتقربك من فهم أعمق لنفسك.</p></div></div><Nav active={S.PROFILE} go={go}/></div>)}
function App(){const[s,setS]=useState(S.SPLASH);const go=useCallback(n=>setS(n),[]);const screens=[[S.SPLASH,<Splash done={()=>go(S.ONBOARD)}/>],[S.ONBOARD,<Onboard done={()=>go(S.WELCOME)}/>],[S.WELCOME,<Welcome go={go}/>],[S.HOME,<Home go={go}/>],[S.CHAT,<Chat go={go}/>],[S.QUIZ,<Quiz go={go}/>],[S.RESULTS,<Results go={go}/>],[S.JOURNEY,<Journey go={go}/>],[S.VIDEO,<Video go={go}/>],[S.SESSIONS,<Sessions go={go}/>],[S.LEGAL,<Legal go={go}/>],[S.PROFILE,<Profile go={go}/>],[S.BREATHE,<Breathe go={go}/>],[S.STORIES,<Stories go={go}/>],[S.REPORT,<Report go={go}/>]];return <>{screens.map(([id,el])=><div key={id} className={`scr ${s===id?'on':''}`}>{el}</div>)}</>}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
