<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>صَوْن — ودودة صديقك الرقمي الآمن</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#020810;font-family:'Noto Naskh Arabic','Segoe UI',sans-serif}
input::placeholder{color:#4a6a80}
::-webkit-scrollbar{width:0}
button{font-family:'Noto Naskh Arabic','Segoe UI',sans-serif}
button:active{transform:scale(0.96)!important}
@keyframes wadoudaFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadBar{from{width:0}to{width:100%}}
@keyframes typingDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes pulseGlow{0%,100%{opacity:.3;r:6}50%{opacity:.7;r:10}}
@keyframes eyeBlink{0%,90%,100%{opacity:.85}95%{opacity:.4}}

.phone-frame{
  width:100%;max-width:390px;height:100dvh;max-height:844px;
  margin:0 auto;position:relative;overflow:hidden;background:#060e18;
}
@media(min-width:420px){
  body{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .phone-frame{border-radius:40px;box-shadow:0 20px 80px rgba(0,0,0,.8)}
}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .4s ease;overflow:hidden}
.screen.hidden{opacity:0;pointer-events:none;z-index:0}
.screen.active{opacity:1;pointer-events:auto;z-index:10}

.status-bar{display:flex;justify-content:space-between;padding:8px 16px;color:#7a9bb5;font-size:11px;font-weight:600;flex-shrink:0}
.bottom-nav{display:flex;justify-content:space-around;align-items:center;background:linear-gradient(180deg,#0d1f30,#091828);border-top:1px solid rgba(0,229,200,.15);padding:8px 0 14px;position:absolute;bottom:0;left:0;right:0;z-index:100;flex-shrink:0}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 8px;transition:all .3s}
.nav-btn .icon{font-size:20px}
.nav-btn .label{font-size:10px;font-weight:600}
.nav-btn.active{opacity:1;transform:scale(1.1)}
.nav-btn.active .label{color:#00e5c8}
.nav-btn.active .dot{width:4px;height:4px;border-radius:50%;background:#00e5c8;margin-top:2px}
.nav-btn:not(.active){opacity:.5}
.nav-btn:not(.active) .label{color:#7a9bb5}

.chat-bubble{max-width:82%;padding:12px 16px;font-size:14px;line-height:1.8;direction:rtl;white-space:pre-line;animation:fadeUp .4s ease-out}
.chat-bubble.bot{border-radius:18px 18px 18px 4px;background:linear-gradient(135deg,#152a3d,#0d1f30);color:#d0e8f0;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.chat-bubble.user{border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#00e5c8,#007878);color:#060e18;box-shadow:0 2px 12px rgba(0,229,200,.2)}
.chat-time{font-size:10px;opacity:.5;margin-top:4px;text-align:left}

.quiz-opt{padding:14px 20px;background:#0d1f30;border:1px solid rgba(0,229,200,.2);border-radius:14px;color:#d0e8f0;font-size:16px;cursor:pointer;font-weight:600;transition:all .3s;text-align:center;width:100%}
.quiz-opt:hover{background:rgba(0,229,200,.1)}
.quiz-opt.selected{background:linear-gradient(135deg,#00e5c8,#007878);color:#060e18;border-color:#00e5c8}

.journey-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:16px;margin-bottom:10px;cursor:pointer;transition:all .3s}
.journey-card.done{background:rgba(0,229,200,.06);border:1px solid rgba(0,229,200,.2)}
.journey-card.pending{background:#0d1f30;border:1px solid rgba(255,255,255,.05);opacity:.7}

.specialist-card{background:#0d1f30;border-radius:20px;padding:20px 18px;margin-bottom:12px;border:1px solid rgba(0,229,200,.1)}

.settings-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#0d1f30;border-radius:14px;margin-bottom:8px;border:1px solid rgba(0,229,200,.06);cursor:pointer}

.insight-box{background:rgba(0,229,200,.08);border-radius:16px;padding:16px 20px;border:1px solid rgba(0,229,200,.15)}
.cta-primary{padding:14px 0;background:linear-gradient(135deg,#00e5c8,#007878);border:none;border-radius:14px;color:#060e18;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.cta-secondary{padding:14px 0;background:transparent;border:1px solid #00e5c8;border-radius:14px;color:#00e5c8;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.legal-card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:#0d1f30;border-radius:16px;margin-bottom:10px;border:1px solid rgba(0,229,200,.08);cursor:pointer;transition:all .3s}
.emergency-btn{width:100%;padding:16px 0;background:linear-gradient(135deg,rgba(160,40,64,.3),rgba(160,40,64,.1));border:1px solid rgba(160,40,64,.4);border-radius:16px;color:#ff6b7a;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="phone-frame" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const S = {SPLASH:0,WELCOME:1,CHAT:2,QUIZ:3,RESULTS:4,JOURNEY:5,SESSIONS:6,LEGAL:7,PROFILE:8};

/* ---- Wadouda SVG ---- */
function Wadouda({size=120,glow=true,animate=false}){
  return(
    <svg width={size} height={size} viewBox="0 0 200 200" style={animate?{animation:'wadoudaFloat 3s ease-in-out infinite'}:{}}>
      <defs>
        <radialGradient id="bg" cx="50%" cy="40%" r="60%"><stop offset="0%" stopColor="#2a4a6b"/><stop offset="100%" stopColor="#0a1e33"/></radialGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="sg"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <ellipse cx="100" cy="130" rx="55" ry="50" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1.5"/>
      <ellipse cx="100" cy="72" rx="48" ry="42" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1.5"/>
      <ellipse cx="100" cy="75" rx="38" ry="30" fill="#0d1f30" opacity=".9"/>
      <ellipse cx="82" cy="72" rx="10" ry="12" fill="#00e5c8" opacity=".85" filter={glow?"url(#gl)":""}>{animate&&<animate attributeName="opacity" values=".85;.5;.85" dur="3s" repeatCount="indefinite"/>}</ellipse>
      <ellipse cx="118" cy="72" rx="10" ry="12" fill="#00e5c8" opacity=".85" filter={glow?"url(#gl)":""}>{animate&&<animate attributeName="opacity" values=".85;.5;.85" dur="3s" repeatCount="indefinite"/>}</ellipse>
      <path d="M85 88Q100 98 115 88" fill="none" stroke="#00e5c8" strokeWidth="2.5" strokeLinecap="round" opacity=".8"/>
      <path d="M52 65Q52 30 100 28Q148 30 148 65" fill="none" stroke="#1a3a5c" strokeWidth="8" strokeLinecap="round"/>
      <circle cx="50" cy="72" r="14" fill="#1a3a5c"/><circle cx="50" cy="72" r="8" fill="#00e5c8" opacity=".6" filter={glow?"url(#gl)":""}>{animate&&<animate attributeName="opacity" values=".6;.3;.6" dur="2s" repeatCount="indefinite"/>}</circle>
      <circle cx="150" cy="72" r="14" fill="#1a3a5c"/><circle cx="150" cy="72" r="8" fill="#00e5c8" opacity=".6" filter={glow?"url(#gl)":""}>{animate&&<animate attributeName="opacity" values=".6;.3;.6" dur="2s" repeatCount="indefinite"/>}</circle>
      <line x1="50" y1="86" x2="50" y2="100" stroke="#1a3a5c" strokeWidth="3"/><circle cx="50" cy="103" r="5" fill="#1a3a5c"/>
      <circle cx="100" cy="130" r="8" fill="#00e5c8" opacity=".5" filter="url(#sg)">{animate&&<><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;.7;.3" dur="2s" repeatCount="indefinite"/></>}</circle>
      <ellipse cx="55" cy="140" rx="12" ry="8" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1" transform="rotate(-20 55 140)"/>
      <ellipse cx="145" cy="140" rx="12" ry="8" fill="url(#bg)" stroke="#1a3a5c" strokeWidth="1" transform="rotate(20 145 140)"/>
      <circle cx="140" cy="120" r="10" fill="#1a3a5c" stroke="#00e5c8" strokeWidth="1" opacity=".7"/>
    </svg>
  );
}

function StatusBar(){return <div className="status-bar"><span>9:41</span><div style={{display:'flex',gap:6,alignItems:'center'}}><span style={{fontSize:10}}>●●●●○</span><span style={{fontSize:10}}>WiFi</span><span>🔋</span></div></div>}

function BottomNav({active,onNav}){
  const tabs=[{id:S.PROFILE,icon:'👤',label:'حسابي'},{id:S.LEGAL,icon:'⚖️',label:'القانون'},{id:S.SESSIONS,icon:'🎧',label:'جلسات'},{id:S.JOURNEY,icon:'🎓',label:'الرحلة'},{id:S.CHAT,icon:'💬',label:'ودودة'}];
  return <div className="bottom-nav">{tabs.map(t=><button key={t.id} className={`nav-btn ${active===t.id?'active':''}`} onClick={()=>onNav(t.id)}><span className="icon">{t.icon}</span><span className="label">{t.label}</span>{active===t.id&&<div className="dot"/>}</button>)}</div>;
}

/* ---- SCREENS ---- */
function SplashScreen({onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t)},[]);
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',background:'radial-gradient(ellipse at 50% 30%,#0f2d45,#060e18 70%)',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,opacity:.08,backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%2300e5c8' stroke-width='.5'/%3E%3C/svg%3E\")",backgroundSize:'60px'}}/>
      <div style={{animation:'wadoudaFloat 3s ease-in-out infinite, fadeInScale 1s ease-out'}}><Wadouda size={160} glow animate/></div>
      <h1 style={{fontSize:52,fontWeight:700,color:'#fff',margin:'24px 0 8px',animation:'fadeUp 1s .5s both'}}>صَوْن</h1>
      <p style={{color:'#00e5c8',fontSize:14,fontWeight:500,opacity:0,animation:'fadeUp 1s 1s both',letterSpacing:1}}>ودودة — صديقك الرقمي الآمن</p>
      <div style={{marginTop:40,width:120,height:3,borderRadius:3,background:'#1a3a5c',overflow:'hidden',animation:'fadeUp 1s 1.5s both'}}><div style={{height:'100%',background:'linear-gradient(90deg,#00e5c8,#007878)',animation:'loadBar 2s ease-in-out forwards',borderRadius:3}}/></div>
    </div>
  );
}

function WelcomeScreen({onStart}){
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:32,textAlign:'center',background:'radial-gradient(ellipse at 50% 20%,#0f2d45,#060e18 80%)',position:'relative'}}>
      <div style={{position:'absolute',top:40,left:0,right:0,display:'flex',justifyContent:'center'}}><div style={{width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(0,229,200,.08),transparent 70%)'}}/></div>
      <div style={{animation:'wadoudaFloat 4s ease-in-out infinite'}}><Wadouda size={130} glow animate/></div>
      <h2 style={{color:'#fff',fontSize:26,margin:'24px 0 12px',fontWeight:700}}>مرحبًا بك في صَوْن</h2>
      <p style={{color:'#8ab4cc',fontSize:14,lineHeight:2,maxWidth:280,direction:'rtl'}}>أنا ودودة، رفيقتك الرقمية الآمنة. أنا هون عشان أسمعك وأساعدك بخصوصية تامة وأمان. لا حساب، لا بيانات، لا حكم.</p>
      <button onClick={onStart} className="cta-primary" style={{marginTop:32,padding:'16px 48px',borderRadius:28,fontSize:17,boxShadow:'0 4px 30px rgba(0,229,200,.35)',width:'auto'}}>ابدأ الآن</button>
      <p style={{color:'#4a7a95',fontSize:11,marginTop:16}}>لا تسجيل • لا بيانات شخصية • سرية تامة</p>
    </div>
  );
}

function ChatScreen({onNav}){
  const[msgs,setMsgs]=useState([{from:'bot',text:'مرحبًا! أنا ودودة 💚\nأنا هون لأسمعك وأدلك على الطريق الصحيح بخصوصية تامة وأمان.\n\nاحكيلي شو المشكلة اللي شاغلة بالك؟',time:'9:41'}]);
  const[input,setInput]=useState('');
  const[typing,setTyping]=useState(false);
  const ref=useRef(null);
  const send=()=>{if(!input.trim())return;const t=input.trim();setInput('');setMsgs(p=>[...p,{from:'user',text:t,time:'9:42'}]);setTyping(true);setTimeout(()=>{setTyping(false);setMsgs(p=>[...p,{from:'bot',text:'أسمعك وأحس فيك. اللي بتمري فيه مش بسيط، وأنتِ مش مبالغة.\n\nعشان أفهم أكثر وأقدر أساعدك، خليني أسألك كم سؤال بسيط — مش اختبار صعب، بس أسئلة تساعدني أفهم الوضع.\n\nجاهزة؟ 💚',time:'9:42',action:{label:'ابدأ الاختبار',screen:S.QUIZ}}])},2000)};
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs,typing]);
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18'}}>
      <StatusBar/>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'8px 16px 12px',borderBottom:'1px solid rgba(0,229,200,.1)',flexShrink:0}}>
        <Wadouda size={42} glow={false}/><div style={{flex:1,direction:'rtl'}}><div style={{color:'#fff',fontSize:16,fontWeight:700}}>ودودة</div><div style={{color:'#00e5c8',fontSize:11}}>{typing?'تكتب...':'متصلة الآن'}</div></div>
        <div style={{width:8,height:8,borderRadius:'50%',background:'#00e5c8',boxShadow:'0 0 8px #00e5c8'}}/>
      </div>
      <div ref={ref} style={{flex:1,overflowY:'auto',padding:'16px 12px 8px',display:'flex',flexDirection:'column',gap:12}}>
        {msgs.map((m,i)=><div key={i} style={{display:'flex',justifyContent:m.from==='user'?'flex-end':'flex-start'}}><div className={`chat-bubble ${m.from}`}>{m.text}{m.action&&<button onClick={()=>onNav(m.action.screen)} className="cta-primary" style={{marginTop:12,borderRadius:14,fontSize:14}}>{m.action.label}</button>}<div className="chat-time">{m.time}</div></div></div>)}
        {typing&&<div style={{display:'flex',gap:4,padding:'12px 16px',animation:'fadeUp .3s'}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'#00e5c8',opacity:.5,animation:`typingDot 1.2s ${i*.2}s infinite`}}/>)}</div>}
      </div>
      <div style={{padding:'10px 12px',borderTop:'1px solid rgba(0,229,200,.1)',display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
        <button onClick={send} style={{width:42,height:42,borderRadius:'50%',border:'none',background:'linear-gradient(135deg,#00e5c8,#007878)',color:'#060e18',fontSize:18,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',transform:'rotate(180deg)'}}>➤</button>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="اكتب رسالتك..." style={{flex:1,padding:'12px 16px',background:'#0d1f30',border:'1px solid rgba(0,229,200,.15)',borderRadius:22,color:'#d0e8f0',fontSize:14,outline:'none',direction:'rtl'}}/>
      </div>
      <BottomNav active={S.CHAT} onNav={onNav}/>
    </div>
  );
}

function QuizScreen({onNav}){
  const qs=[{q:'هل يقلّل شريكك من مشاعرك أو آرائك بشكل متكرر؟'},{q:'هل تشعر/ين بأنك المسؤول/ة عن مزاج شريكك السيئ؟'},{q:'هل يتجاهلك شريكك لأيام كعقاب دون سبب واضح؟'},{q:'هل تشك/ين في ذاكرتك أو إدراكك بسبب ما يقوله لك؟'},{q:'هل تجد/ين صعوبة في اتخاذ قرار دون موافقة شريكك؟'}];
  const opts=['دائمًا','أحيانًا','نادرًا','أبدًا'];
  const[idx,setIdx]=useState(0);const[sel,setSel]=useState(null);
  const next=(o)=>{setSel(o);setTimeout(()=>{setSel(null);if(idx<qs.length-1)setIdx(i=>i+1);else onNav(S.RESULTS)},400)};
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}>
      <StatusBar/>
      <div style={{padding:'12px 20px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}><Wadouda size={36} glow={false}/><div><div style={{color:'#fff',fontSize:14,fontWeight:700}}>الاختبار التشخيصي</div><div style={{color:'#7a9bb5',fontSize:11}}>سؤال {idx+1} من {qs.length}</div></div></div>
        <div style={{height:6,background:'#152a3d',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${(idx/qs.length)*100}%`,background:'linear-gradient(90deg,#00e5c8,#007878)',borderRadius:3,transition:'width .5s ease'}}/></div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 20px',gap:24}}>
        <div style={{background:'linear-gradient(135deg,#152a3d,#0d1f30)',borderRadius:20,padding:'28px 24px',boxShadow:'0 8px 32px rgba(0,0,0,.4)',border:'1px solid rgba(0,229,200,.1)'}}>
          <p style={{color:'#fff',fontSize:18,lineHeight:2,margin:0,textAlign:'center'}}>{qs[idx].q}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>{opts.map((o,i)=><button key={i} className={`quiz-opt ${sel===o?'selected':''}`} onClick={()=>next(o)}>{o}</button>)}</div>
      </div>
      <BottomNav active={S.QUIZ} onNav={onNav}/>
    </div>
  );
}

function ResultsScreen({onNav}){
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}>
      <StatusBar/>
      <div style={{flex:1,overflowY:'auto',padding:'20px 20px 80px'}}>
        <div style={{textAlign:'center',marginBottom:20}}><Wadouda size={80} glow animate/></div>
        <div style={{background:'linear-gradient(135deg,#152a3d,#0d1f30)',borderRadius:20,padding:'24px 20px',boxShadow:'0 8px 32px rgba(0,0,0,.4)',border:'1px solid rgba(0,229,200,.15)',marginBottom:16}}>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{display:'inline-block',padding:'6px 20px',background:'rgba(0,229,200,.15)',borderRadius:20,color:'#00e5c8',fontSize:12,fontWeight:600,marginBottom:12}}>نتيجة الاختبار</div>
            <h2 style={{color:'#fff',fontSize:22,margin:'8px 0'}}>مؤشرات على إساءة عاطفية خفية</h2>
            <p style={{color:'#00e5c8',fontSize:14,fontWeight:700}}>مستوى التأثر: متوسط إلى مرتفع</p>
          </div>
          <div style={{display:'flex',justifyContent:'center',margin:'16px 0'}}>
            <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#152a3d" strokeWidth="8"/><circle cx="60" cy="60" r="52" fill="none" stroke="#00e5c8" strokeWidth="8" strokeLinecap="round" strokeDasharray={`${.68*2*Math.PI*52} ${2*Math.PI*52}`} transform="rotate(-90 60 60)" style={{filter:'drop-shadow(0 0 6px rgba(0,229,200,.5))'}}/><text x="60" y="55" textAnchor="middle" fill="#fff" fontSize="28" fontWeight="700">68%</text><text x="60" y="72" textAnchor="middle" fill="#7a9bb5" fontSize="10">مستوى التأثر</text></svg>
          </div>
        </div>
        <div className="insight-box" style={{marginBottom:16}}><p style={{color:'#d0e8f0',fontSize:14,lineHeight:2,margin:0}}>ما تعيشينه له اسم: <strong style={{color:'#00e5c8'}}>الإساءة العاطفية الخفية</strong>. وهي ليست مبالغة ولا تخيّلًا. هذا النمط يشمل التقليل المستمر والتجاهل والتلاعب بالإدراك. أنتِ لستِ المشكلة.</p></div>
        <div style={{display:'flex',gap:10}}><button onClick={()=>onNav(S.JOURNEY)} className="cta-primary" style={{flex:1}}>ابدأ الرحلة المعرفية</button><button onClick={()=>onNav(S.SESSIONS)} className="cta-secondary" style={{flex:1}}>احجز جلسة</button></div>
      </div>
      <BottomNav active={S.RESULTS} onNav={onNav}/>
    </div>
  );
}

function JourneyScreen({onNav}){
  const vids=[{t:'ما هي الإساءة العاطفية الخفية؟',d:'12 دقيقة',i:'📖',done:true},{t:'التقليل المستمر من شأن الشريك',d:'9 دقائق',i:'💔',done:true},{t:'سلوك الجذب والصد في الخطوبة',d:'11 دقيقة',i:'🔄',done:false},{t:'التلاعب النفسي والتشكيك بالإدراك',d:'14 دقيقة',i:'🧠',done:false},{t:'حدودك حقك — كيف ترسم الحدود',d:'10 دقائق',i:'🛡️',done:false},{t:'متى تطلب المساعدة المتخصصة',d:'8 دقائق',i:'🤝',done:false}];
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}>
      <StatusBar/>
      <div style={{padding:'12px 20px 8px',flexShrink:0}}>
        <h2 style={{color:'#fff',fontSize:20,margin:'0 0 4px'}}>الرحلة المعرفية</h2>
        <p style={{color:'#7a9bb5',fontSize:12,margin:0}}>مسار شخصي مبني على نتيجة اختبارك</p>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12}}><div style={{flex:1,height:6,background:'#152a3d',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:'33%',background:'linear-gradient(90deg,#00e5c8,#007878)',borderRadius:3}}/></div><span style={{color:'#00e5c8',fontSize:12,fontWeight:700}}>2 من 6</span></div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 80px'}}>
        {vids.map((v,i)=><div key={i} className={`journey-card ${v.done?'done':'pending'}`}><div style={{width:44,height:44,borderRadius:12,background:v.done?'linear-gradient(135deg,#00e5c8,#007878)':'#152a3d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,color:v.done?'#060e18':'inherit'}}>{v.done?'✓':v.i}</div><div style={{flex:1}}><div style={{color:'#fff',fontSize:14,fontWeight:600}}>{v.t}</div><div style={{color:'#7a9bb5',fontSize:11,marginTop:4}}>{v.d}</div></div><div style={{color:'#4a7a95',fontSize:18}}>‹</div></div>)}
      </div>
      <BottomNav active={S.JOURNEY} onNav={onNav}/>
    </div>
  );
}

function SessionsScreen({onNav}){
  const sp=[{n:'د. سارة المحمود',s:'علاج معرفي سلوكي',r:4.9,p:'الجلسة الأولى مجانية',a:true},{n:'د. هند العبادي',s:'إرشاد أسري وزوجي',r:4.8,p:'15 دينارًا للطلاب',a:true},{n:'د. رنا الخطيب',s:'صدمات نفسية وعنف',r:4.7,p:'20 دينارًا لغير الطلاب',a:false}];
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}>
      <StatusBar/>
      <div style={{padding:'12px 20px 8px',flexShrink:0}}><h2 style={{color:'#fff',fontSize:20,margin:'0 0 4px'}}>الجلسات الخاصة</h2><p style={{color:'#7a9bb5',fontSize:12,margin:0}}>جلستك الأولى مجانية — بخصوصية تامة</p></div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 80px'}}>
        {sp.map((s,i)=><div key={i} className="specialist-card" style={{opacity:s.a?1:.5}}>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}><div style={{width:50,height:50,borderRadius:'50%',background:'linear-gradient(135deg,#152a3d,#1a3a5c)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>👩‍⚕️</div><div style={{flex:1}}><div style={{color:'#fff',fontSize:15,fontWeight:700}}>{s.n}</div><div style={{color:'#7a9bb5',fontSize:12}}>{s.s}</div></div><div style={{background:'rgba(0,229,200,.1)',padding:'4px 10px',borderRadius:10}}><span style={{color:'#00e5c8',fontSize:13,fontWeight:700}}>⭐ {s.r}</span></div></div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'#00e5c8',fontSize:13,fontWeight:600}}>{s.p}</span><button style={{padding:'10px 24px',background:s.a?'linear-gradient(135deg,#00e5c8,#007878)':'#1a3a5c',border:'none',borderRadius:12,color:s.a?'#060e18':'#7a9bb5',fontSize:13,fontWeight:700,cursor:s.a?'pointer':'default'}}>{s.a?'احجز الآن':'غير متاحة حاليًا'}</button></div>
        </div>)}
        <div className="insight-box" style={{textAlign:'center'}}><p style={{color:'#8ab4cc',fontSize:13,lineHeight:1.8,margin:0}}>🔒 جميع الجلسات سرية ومشفّرة تمامًا</p></div>
      </div>
      <BottomNav active={S.SESSIONS} onNav={onNav}/>
    </div>
  );
}

function LegalScreen({onNav}){
  const arts=[{t:'قانون الحماية من العنف الأسري رقم 15',d:'النصوص الكاملة مبسّطة باللغة العربية',i:'📜'},{t:'حقوقك كضحية عنف عاطفي',d:'ما الذي يحميك القانون الأردني منه',i:'⚖️'},{t:'كيف تقدّم/ين شكوى رسمية',d:'الخطوات والجهات المختصة',i:'📝'},{t:'خط الطوارئ والدعم الفوري',d:'أرقام ومراكز المساعدة المباشرة',i:'🆘'}];
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}>
      <StatusBar/>
      <div style={{padding:'12px 20px 8px',flexShrink:0}}><h2 style={{color:'#fff',fontSize:20,margin:'0 0 4px'}}>المكتبة القانونية</h2><p style={{color:'#7a9bb5',fontSize:12,margin:0}}>بشراكة مع جهة قانونية معتمدة</p></div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 80px'}}>
        {arts.map((a,i)=><div key={i} className="legal-card"><div style={{width:48,height:48,borderRadius:14,background:'#152a3d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{a.i}</div><div style={{flex:1}}><div style={{color:'#fff',fontSize:14,fontWeight:600}}>{a.t}</div><div style={{color:'#7a9bb5',fontSize:12,marginTop:4}}>{a.d}</div></div><div style={{color:'#4a7a95',fontSize:18}}>‹</div></div>)}
        <button className="emergency-btn">🆘 اتصل بخط الطوارئ الآن</button>
      </div>
      <BottomNav active={S.LEGAL} onNav={onNav}/>
    </div>
  );
}

function ProfileScreen({onNav}){
  const stats=[{n:'5',l:'أيام متالية'},{n:'68%',l:'مستوى التأثر'},{n:'2',l:'فيديو مكتمل'}];
  const sets=[{i:'🔔',l:'التنبيهات',s:'مفعّلة'},{i:'🌙',l:'وضع النوم',s:'11 م — 7 ص'},{i:'🔐',l:'الخصوصية والأمان',s:'تشفير محلي كامل'},{i:'🌐',l:'اللغة',s:'العربية'},{i:'📊',l:'تقرير الأسبوع',s:'عرض الملخص'},{i:'❓',l:'المساعدة',s:'الأسئلة الشائعة'}];
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#060e18',direction:'rtl'}}>
      <StatusBar/>
      <div style={{flex:1,overflowY:'auto',padding:'16px 20px 80px'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,#152a3d,#0d1f30)',border:'2px solid #00e5c8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 12px'}}>🌿</div>
          <h2 style={{color:'#fff',fontSize:18,margin:'0 0 4px'}}>مستخدم/ة مجهول/ة</h2><p style={{color:'#7a9bb5',fontSize:12}}>خصوصيتك هي أولويتنا</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>{stats.map((s,i)=><div key={i} style={{background:'#0d1f30',borderRadius:16,padding:'16px 8px',textAlign:'center',border:'1px solid rgba(0,229,200,.08)'}}><div style={{color:'#00e5c8',fontSize:22,fontWeight:700}}>{s.n}</div><div style={{color:'#7a9bb5',fontSize:10,marginTop:4}}>{s.l}</div></div>)}</div>
        {sets.map((item,i)=><div key={i} className="settings-row"><span style={{fontSize:20}}>{item.i}</span><div style={{flex:1}}><div style={{color:'#fff',fontSize:14,fontWeight:600}}>{item.l}</div><div style={{color:'#7a9bb5',fontSize:11}}>{item.s}</div></div><div style={{color:'#4a7a95'}}>‹</div></div>)}
      </div>
      <BottomNav active={S.PROFILE} onNav={onNav}/>
    </div>
  );
}

/* ---- APP ---- */
function App(){
  const[screen,setScreen]=useState(S.SPLASH);
  const nav=(s)=>setScreen(s);
  return(
    <>
      <div className={`screen ${screen===S.SPLASH?'active':'hidden'}`}><SplashScreen onDone={()=>nav(S.WELCOME)}/></div>
      <div className={`screen ${screen===S.WELCOME?'active':'hidden'}`}><WelcomeScreen onStart={()=>nav(S.CHAT)}/></div>
      <div className={`screen ${screen===S.CHAT?'active':'hidden'}`}><ChatScreen onNav={nav}/></div>
      <div className={`screen ${screen===S.QUIZ?'active':'hidden'}`}><QuizScreen onNav={nav}/></div>
      <div className={`screen ${screen===S.RESULTS?'active':'hidden'}`}><ResultsScreen onNav={nav}/></div>
      <div className={`screen ${screen===S.JOURNEY?'active':'hidden'}`}><JourneyScreen onNav={nav}/></div>
      <div className={`screen ${screen===S.SESSIONS?'active':'hidden'}`}><SessionsScreen onNav={nav}/></div>
      <div className={`screen ${screen===S.LEGAL?'active':'hidden'}`}><LegalScreen onNav={nav}/></div>
      <div className={`screen ${screen===S.PROFILE?'active':'hidden'}`}><ProfileScreen onNav={nav}/></div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
